<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MLB Stats PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1c2c;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #00d4ff;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00d4ff;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #00aacc;
    }

    table {
      margin-top: 20px;
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }

    th {
      background: #00d4ff;
    }

    .delete {
      background: red;
      color: white;
    }
  </style>
</head>
<body>

  <h1>⚾ MLB Stats PRO</h1>

  <input type="text" id="player" placeholder="Jugador">

  <br>

  <button onclick="addStat('hit')">Hit</button>
  <button onclick="addStat('double')">2B</button>
  <button onclick="addStat('triple')">3B</button>
  <button onclick="addStat('hr')">HR</button>
  <button onclick="addStat('bb')">BB</button>
  <button onclick="addStat('so')">SO</button>
  <button onclick="addStat('ab')">AB</button>

  <table>
    <thead>
      <tr>
        <th>Jugador</th>
        <th>H</th>
        <th>2B</th>
        <th>3B</th>
        <th>HR</th>
        <th>BB</th>
        <th>SO</th>
        <th>AB</th>
        <th>AVG</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="statsTable"></tbody>
  </table>

  <script>
    let stats = JSON.parse(localStorage.getItem("mlbStats")) || {};

    function save() {
      localStorage.setItem("mlbStats", JSON.stringify(stats));
    }

    function addStat(type) {
      let player = document.getElementById("player").value.trim();

      if (!player) {
        alert("Escribe el nombre del jugador");
        return;
      }

      if (!stats[player]) {
        stats[player] = {
          hit: 0,
          double: 0,
          triple: 0,
          hr: 0,
          bb: 0,
          so: 0,
          ab: 0
        };
      }

      stats[player][type]++;
      save();
      renderTable();
    }

    function calculateAVG(player) {
      let hits = stats[player].hit;
      let ab = stats[player].ab;
      if (ab === 0) return "0.000";
      return (hits / ab).toFixed(3);
    }

    function deletePlayer(player) {
      if (confirm("Eliminar jugador?")) {
        delete stats[player];
        save();
        renderTable();
      }
    }

    function renderTable() {
      let table = document.getElementById("statsTable");
      table.innerHTML = "";

      for (let player in stats) {
        let row = `
          <tr>
            <td>${player}</td>
            <td>${stats[player].hit}</td>
            <td>${stats[player].double}</td>
            <td>${stats[player].triple}</td>
            <td>${stats[player].hr}</td>
            <td>${stats[player].bb}</td>
            <td>${stats[player].so}</td>
            <td>${stats[player].ab}</td>
            <td>${calculateAVG(player)}</td>
            <td><button class="delete" onclick="deletePlayer('${player}')">X</button></td>
          </tr>
        `;
        table.innerHTML += row;
      }
    }

    renderTable();
  </script>

</body>
</html>
